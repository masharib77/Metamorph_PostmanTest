name: PR Merged → Metamorphos Webhook

# Trigger when a PR is closed (merged or just closed)
on:
  pull_request:
    types: [closed]

jobs:
  send-webhook:
    runs-on: ubuntu-latest
    # Only run if PR was actually merged
    if: github.event.pull_request.merged == true

    steps:
      - name: Send webhook to Metamorphos
        run: |
          curl -X POST \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer ${{ secrets.METAMORPHOS_TOKEN }}" \
          -d '{
                "pr_number": '${{ github.event.pull_request.number }}',
                "title": "${{ github.event.pull_request.title }}",
                "merged_by": "${{ github.event.pull_request.merged_by.login }}",
                "repository": "${{ github.repository }}",
                "url": "${{ github.event.pull_request.html_url }}"
              }' \
          https://app.metamorphos.io/api/8b989a66-abda-42e0-b362-e1eeed08fa32>/webhook